name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─────────────────────────────────────────
  # 1. Lint Python backend
  # ─────────────────────────────────────────
  lint-backend:
    name: Lint Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt flake8

      - name: Run flake8
        run: flake8 app/ --max-line-length=120 --exclude=__pycache__

  # ─────────────────────────────────────────
  # 2. Lint & build React frontend
  # ─────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build
        working-directory: frontend
        run: npm run build

  # ─────────────────────────────────────────
  # 3. Build API Docker image
  # ─────────────────────────────────────────
  build-api-docker:
    name: Build API Docker Image
    runs-on: ubuntu-latest
    needs: lint-backend
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t comp3161-api:${{ github.sha }} .

  # ─────────────────────────────────────────
  # 4. Build Frontend Docker image
  # ─────────────────────────────────────────
  build-frontend-docker:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    needs: build-frontend
    steps:
      - uses: actions/checkout@v4

      - name: Build image
        run: docker build -t comp3161-frontend:${{ github.sha }} ./frontend

